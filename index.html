<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Proyección — prototipo</title>
    <style>
      /* Fondo negro total y lienzo centrado, sin scroll: marco neutro para el juego */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }
      /* Nitidez pixel art: el navegador no debe suavizar el escalado del canvas */
      #app canvas {
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
